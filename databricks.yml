# This is a Databricks asset bundle definition for simple_etl_dab.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: simple_etl_dab
  uuid: 6023e97f-289a-417a-a411-821ac3c14427

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-70dcb1ea-d905.cloud.databricks.com
    variables:
      catalog: workspace
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-70dcb1ea-d905.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/karthikprabhu13072000@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/karthikprabhu13072000@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      schema: prod
    permissions:
      - user_name: karthikprabhu13072000@gmail.com
        level: CAN_MANAGE
